<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
               initial-scale=1,
               viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/css/reset.css"/>
    <link rel="stylesheet" href="assets/styles/css/index.css"/>

    <title>Document</title>
</head>
<body>
<div class="page-wrapper">
    <header class="header">
        <a class="header__logo logo" href="#"><img class="logo__img" src="assets/media/images/logo.svg"/></a>
    </header>
    <main class="content">
        <div class="content__wrapper">
            <div class="container">
                <div class="block">
                    <div class="block__wrapper">
                        <div class="block__header">
                            <div class="block__title">
                                <p class="text text--middle text--medium">Регистрация</p>
                            </div>
                        </div>
                        <form class="block__content block__content--form form">
                            <div class="form__wrapper">
                                <div class="form__content">
                                    <label class="input">
                                        <span class="input__label">E-mail</span>
                                        <input class="input__item" type="email" placeholder="ivanivanov@inbox.com"
                                               required/>
                                    </label>
                                    <label class="input">
                                        <span class="input__label">Пароль</span>
                                        <input class="input__item" type="password" placeholder="************" required/>
                                    </label>
                                    <label class="input">
                                        <span class="input__label">Повторите пароль</span>
                                        <input class="input__item" type="password" placeholder="************" required/>
                                    </label>
                                    <p class="form__text">
                        <span>
                          Уже есть аккаунт?
                          <a href="login.html">Войти</a>
                        </span>
                                    </p>
                                </div>
                                <div class="form__content">
                                    <button class="button button--base button--dark button--login button--center"
                                            type="submit">
                                        Зарегистрироваться
                                    </button>
                                    <label class="checkbox">
                                        <input class="checkbox__input" type="checkbox" required/>
                                        <span class="checkbox__checkmark"></span>
                                        <span class="checkbox__text">
                          Я принимаю условия
                          <a class="checkbox__text checkbox__text--colorfull" href="#">Пользовательского соглашения</a>
                        </span>
                                    </label>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
